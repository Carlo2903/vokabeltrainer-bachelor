<!DOCTYPE html>

<html class="dark" lang="de"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "0.75rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
    <!-- Top Navigation Bar -->
    <div class="flex items-center p-4 pb-2 justify-between">
        <div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
            <span class="material-symbols-outlined text-2xl">arrow_back</span>
        </div>
        <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Einstellungen</h2>
    </div>
    <!-- Header Content -->
    <div class="px-4 pt-5 pb-2">
        <h3 class="text-slate-900 dark:text-slate-100 tracking-light text-3xl font-bold leading-tight">Passwort ändern</h3>
        <p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal mt-2">
            Ihr neues Passwort muss mindestens 8 Zeichen lang sein und sich von Ihrem bisherigen Passwort unterscheiden.
        </p>
    </div>
    <!-- Form Section -->
    <div class="flex flex-col gap-6 px-4 py-6 max-w-[480px]">
        <!-- Current Password -->
        <label class="flex flex-col gap-2">
            <span class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal ml-1">Aktuelles Passwort</span>
            <div class="flex w-full items-stretch rounded-xl overflow-hidden border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 focus-within:border-primary transition-colors">
                <input class="form-input flex w-full border-none bg-transparent h-14 placeholder:text-slate-400 dark:placeholder:text-primary/40 px-4 text-base font-normal focus:ring-0" placeholder="Passwort eingeben" type="password"/>
                <div class="flex items-center justify-center px-4 text-slate-500 dark:text-primary/60 cursor-pointer hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">visibility</span>
                </div>
            </div>
        </label>
        <!-- New Password -->
        <label class="flex flex-col gap-2">
            <span class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal ml-1">Neues Passwort</span>
            <div class="flex w-full items-stretch rounded-xl overflow-hidden border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 focus-within:border-primary transition-colors">
                <input class="form-input flex w-full border-none bg-transparent h-14 placeholder:text-slate-400 dark:placeholder:text-primary/40 px-4 text-base font-normal focus:ring-0" placeholder="Mindestens 8 Zeichen" type="password"/>
                <div class="flex items-center justify-center px-4 text-slate-500 dark:text-primary/60 cursor-pointer hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">visibility</span>
                </div>
            </div>
        </label>
        <!-- Confirm New Password -->
        <label class="flex flex-col gap-2">
            <span class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal ml-1">Passwort bestätigen</span>
            <div class="flex w-full items-stretch rounded-xl overflow-hidden border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 focus-within:border-primary transition-colors">
                <input class="form-input flex w-full border-none bg-transparent h-14 placeholder:text-slate-400 dark:placeholder:text-primary/40 px-4 text-base font-normal focus:ring-0" placeholder="Passwort wiederholen" type="password"/>
                <div class="flex items-center justify-center px-4 text-slate-500 dark:text-primary/60 cursor-pointer hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">visibility</span>
                </div>
            </div>
        </label>
        <!-- Password Requirements List -->
        <div class="bg-primary/5 rounded-xl p-4 mt-2">
            <h4 class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-primary/60 mb-3">Sicherheitsanforderungen</h4>
            <ul class="space-y-2">
                <li class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
                    <span class="material-symbols-outlined text-sm text-primary">check_circle</span>
                    Mindestens 8 Zeichen
                </li>
                <li class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
                    <span class="material-symbols-outlined text-sm text-slate-400">circle</span>
                    Ein Großbuchstabe
                </li>
                <li class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
                    <span class="material-symbols-outlined text-sm text-slate-400">circle</span>
                    Eine Zahl oder ein Sonderzeichen
                </li>
            </ul>
        </div>
    </div>
    <!-- Action Buttons -->
    <div class="mt-auto px-4 py-8 flex flex-col gap-3 max-w-[480px]">
        <button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold h-14 rounded-xl transition-all shadow-lg shadow-primary/20">
            Passwort speichern
        </button>
        <button class="w-full bg-transparent border border-slate-200 dark:border-primary/20 text-slate-900 dark:text-slate-100 font-semibold h-14 rounded-xl hover:bg-slate-100 dark:hover:bg-primary/10 transition-all">
            Abbrechen
        </button>
    </div>
    <div class="h-10"></div>
</div>
</body></html>
