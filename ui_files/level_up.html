<!DOCTYPE html>

<html class="dark" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Level Up! - Vocabulary Master</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#13ec5b",
                "background-light": "#f6f8f6",
                "background-dark": "#102216",
              },
              fontFamily: {
                "display": ["Lexend"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
    <style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
    <!-- Top App Bar -->
    <header class="flex items-center p-4 justify-between bg-background-light dark:bg-background-dark sticky top-0 z-10">
        <button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
            <span class="material-symbols-outlined">close</span>
        </button>
        <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Sieg!</h2>
        <button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
            <span class="material-symbols-outlined">share</span>
        </button>
    </header>
    <main class="flex-1 flex flex-col items-center px-6 pb-12">
        <!-- Hero Badge Section -->
        <div class="w-full max-w-md py-8 flex flex-col items-center justify-center text-center">
            <div class="relative mb-6">
                <!-- Glow effect -->
                <div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full"></div>
                <!-- Badge Icon Container -->
                <div class="relative flex items-center justify-center w-40 h-40 bg-gradient-to-br from-primary/30 to-primary/10 rounded-full border-4 border-primary">
                    <span class="material-symbols-outlined text-primary" style="font-size: 80px; font-variation-settings: 'FILL' 1;">workspace_premium</span>
                </div>
                <!-- Small Floaties -->
                <div class="absolute -top-2 -right-2 bg-primary text-background-dark font-bold px-3 py-1 rounded-full text-sm">
                    LEVEL 15
                </div>
            </div>
            <h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-4xl font-bold leading-tight pb-2">Level Aufstieg!</h1>
            <p class="text-slate-600 dark:text-primary font-medium text-lg leading-normal mb-8">Vokabel-Virtuose</p>
            <!-- Progress Card -->
            <div class="w-full bg-slate-200 dark:bg-primary/5 rounded-xl p-6 border border-slate-300 dark:border-primary/20 mb-8">
                <div class="flex justify-between items-end mb-3">
                    <div class="text-left">
                        <p class="text-slate-500 dark:text-slate-400 text-sm uppercase tracking-wider font-semibold">NÄCHSTES LEVEL</p>
                        <p class="text-slate-900 dark:text-slate-100 text-xl font-bold">1,250 / 1,500 XP</p>
                    </div>
                    <p class="text-primary font-bold">83%</p>
                </div>
                <!-- Progress Bar -->
                <div class="h-4 w-full bg-slate-300 dark:bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-primary rounded-full shadow-[0_0_15px_rgba(19,236,91,0.5)]" style="width: 83%"></div>
                </div>
            </div>
            <!-- Stats Grid -->
            <div class="grid grid-cols-2 gap-4 w-full">
                <div class="flex flex-col gap-2 rounded-xl p-5 bg-slate-100 dark:bg-primary/10 border border-transparent dark:border-primary/10">
                    <div class="flex items-center gap-2 text-primary">
                        <span class="material-symbols-outlined text-xl">bolt</span>
                        <p class="text-sm font-semibold uppercase tracking-wide">XP VERDIENT</p>
                    </div>
                    <p class="text-slate-900 dark:text-white text-2xl font-bold leading-tight">+450 XP</p>
                    <p class="text-primary text-sm font-medium">+15% bonus</p>
                </div>
                <div class="flex flex-col gap-2 rounded-xl p-5 bg-slate-100 dark:bg-primary/10 border border-transparent dark:border-primary/10">
                    <div class="flex items-center gap-2 text-primary">
                        <span class="material-symbols-outlined text-xl">menu_book</span>
                        <p class="text-sm font-semibold uppercase tracking-wide">GEMEISTERT</p>
                    </div>
                    <p class="text-slate-900 dark:text-white text-2xl font-bold leading-tight">12 Wörter</p>
                    <p class="text-primary text-sm font-medium">Tagesziel erreicht</p>
                </div>
            </div>
            <!-- Session Highlight Image/Visual -->
            <div class="w-full mt-8 rounded-xl overflow-hidden border border-slate-300 dark:border-primary/20 bg-slate-200 dark:bg-primary/5 h-48 relative">
                <div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 to-transparent z-10"></div>
                <div class="absolute bottom-4 left-4 z-20 text-left">
                    <p class="text-white text-sm font-medium opacity-80 uppercase tracking-widest">NEUESTE WÖRTER</p>
                    <p class="text-white text-lg font-bold">Ephemeral • Ubiquitous • Resilient</p>
                </div>
                <img alt="Books and light" class="w-full h-full object-cover" data-alt="Conceptual image of books and soft neon green lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAu99GdDebqp31T4fCMXtqqHQWexjdMH89Xmpm_nXxva-14Qh-7YEl_YBF9AmMlDiXO7Cc1nw5BArOC76m_twSeR5l3a9HNPhFFKLNPhOFA2pIB84lX8z3jf9mYo0CufQvmc-TSHAUgItoTjjmUCcsxVfIB5K9TwA3OrBWQpReZRwRqde0Wf7CHCg8_nSj5zIYMA_S3A3pSdNN9S3IlApt0DzF8AH-mWZjHkIS6UwBS4f77xOwAgJt6gYVRA3-B9llWbhwazgU6HA4"/>
            </div>
        </div>
    </main>
    <!-- Fixed Action Button -->
    <footer class="p-6 bg-gradient-to-t from-background-light dark:from-background-dark to-transparent sticky bottom-0">
        <div class="max-w-md mx-auto space-y-3">
            <button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2"><span class="material-symbols-outlined font-bold">play_arrow</span> WEITERLERNEN</button>
            <button class="w-full bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-900 dark:text-slate-100 font-semibold py-4 rounded-xl transition-all">ZUM DASHBOARD</button>
        </div>
    </footer>
</div>
</body></html>
