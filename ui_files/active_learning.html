<!DOCTYPE html>
<html class="dark" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Active Learning Session</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22c55e",
                        "danger": "#ef4444",
                        "bg-dark": "#0f172a",
                        "surface-card": "#1e293b",
                        "surface-lighter": "#334155",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        :root {
            --ios-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
        }
        .perspective-1000 {
            perspective: 1000px;
        }
        .glow-progress {
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.6);
        }
        .ios-bottom-bar {
            padding-bottom: env(safe-area-inset-bottom, 24px);
        }
        body {
            background-color: var(--ios-bg);
            min-height: 100dvh;
        }
    </style>
    <style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="font-display text-slate-100 h-screen flex flex-col overflow-hidden selection:bg-primary/30 selection:text-white">
<main class="flex-1 flex flex-col max-w-md mx-auto w-full h-full relative">
    <header class="pt-8 px-6 pb-4 flex flex-col gap-6">
        <div class="flex items-center justify-between">
            <button class="p-2 -ml-2 rounded-full hover:bg-white/10 transition-colors text-slate-400">
                <span class="material-icons-outlined">close</span>
            </button>
            <div class="flex flex-col items-center">
                <span class="text-[10px] font-bold text-slate-500 tracking-[0.2em] uppercase">Session 4 • Review</span>
                <span class="text-sm font-semibold text-slate-200">German Vocabulary</span>
            </div>
            <button class="p-2 -mr-2 rounded-full hover:bg-white/10 transition-colors text-slate-400">
                <span class="material-icons-outlined">settings</span>
            </button>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-[10px] font-bold text-primary tabular-nums">14</span>
            <div class="flex-1 h-2.5 bg-slate-800 rounded-full overflow-hidden border border-white/5">
                <div class="h-full bg-primary w-[35%] rounded-full glow-progress transition-all duration-700"></div>
            </div>
            <span class="text-[10px] font-bold text-slate-500 tabular-nums">40</span>
        </div>
    </header>
    <div class="flex-1 px-6 py-4 flex flex-col justify-center perspective-1000">
        <div class="relative w-full aspect-[4/5] bg-surface-card border border-white/10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] flex flex-col items-center justify-center p-8 transition-transform duration-300">
            <div class="absolute top-8 left-8">
                <div class="bg-slate-900/50 border border-white/10 px-3 py-1 rounded-full flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                    <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest">Verb</span>
                </div>
            </div>
            <div class="flex flex-col items-center text-center space-y-8 w-full">
                <h1 class="text-5xl font-bold text-white tracking-tight">
                    Verstehen
                </h1>
                <button class="flex items-center gap-3 text-slate-300 bg-slate-700/50 hover:bg-slate-700 transition-colors px-5 py-2.5 rounded-2xl border border-white/5">
                    <span class="material-icons text-xl">volume_up</span>
                    <span class="text-sm font-medium">/fɛɐ̯ˈʃteːən/</span>
                </button>
            </div>
            <div class="absolute bottom-8 w-full flex justify-center">
                <button class="flex items-center gap-2 text-slate-500 group">
                    <span class="text-xs font-medium group-hover:text-slate-300 transition-colors">Show Definition</span>
                    <span class="material-icons-outlined text-sm animate-bounce">expand_more</span>
                </button>
            </div>
        </div>
    </div>
    <div class="px-6 ios-bottom-bar pt-2 flex flex-col gap-6">
        <div class="grid grid-cols-2 gap-4">
            <button class="flex flex-col items-center justify-center gap-2 bg-danger/10 active:scale-95 transition-all p-5 rounded-3xl border border-danger/30 group">
                <div class="w-12 h-12 rounded-full bg-danger flex items-center justify-center shadow-lg shadow-danger/20">
                    <span class="material-icons text-white text-2xl">close</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-bold text-danger">Wrong</span>
                    <span class="text-[9px] uppercase tracking-tighter text-danger/70 font-bold">Repeat soon</span>
                </div>
            </button>
            <button class="flex flex-col items-center justify-center gap-2 bg-primary/10 active:scale-95 transition-all p-5 rounded-3xl border border-primary/30 group">
                <div class="w-12 h-12 rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
                    <span class="material-icons text-white text-2xl">check</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-bold text-primary">Correct</span>
                    <span class="text-[9px] uppercase tracking-tighter text-primary/70 font-bold">+15 Points</span>
                </div>
            </button>
        </div>
        <div class="pb-6 flex justify-center">
            <button class="flex items-center gap-2 text-[11px] text-slate-600 font-bold uppercase tracking-widest hover:text-slate-400 transition-colors">
                <span class="material-symbols-outlined text-sm">flag</span>
                Report Issue
            </button>
        </div>
    </div>
</main>
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-500/5 blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] pointer-events-none"></div>

</body></html>
