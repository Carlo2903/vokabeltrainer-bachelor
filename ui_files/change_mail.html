<!DOCTYPE html>

<html class="dark" lang="de"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-dark overflow-x-hidden">
    <!-- TopAppBar -->
    <div class="flex items-center bg-background-dark p-4 pb-2 justify-between">
        <div class="text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
            <span class="material-symbols-outlined text-2xl">arrow_back</span>
        </div>
        <h2 class="text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">E-Mail-Adresse ändern</h2>
    </div>
    <div class="max-w-[480px] w-full mx-auto px-4">
        <!-- Header Section -->
        <div class="pt-8 pb-6">
            <h3 class="text-slate-100 tracking-tight text-3xl font-bold leading-tight text-left pb-2">
                Neue E-Mail festlegen
            </h3>
            <div class="bg-primary/10 border border-primary/30 rounded-xl p-4 mt-4">
                <p class="text-slate-400 text-sm font-medium mb-1">Aktuelle E-Mail-Adresse</p>
                <p class="text-slate-100 text-lg font-semibold">max.mustermann@web.de</p>
            </div>
        </div>
        <!-- Input Form -->
        <div class="space-y-6">
            <div class="flex flex-col gap-2">
                <label class="flex flex-col min-w-40 flex-1">
                    <p class="text-slate-100 text-base font-medium leading-normal pb-2">Neue E-Mail-Adresse</p>
                    <div class="relative">
                        <input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-primary/20 bg-primary/5 h-14 placeholder:text-primary/40 p-[15px] text-base font-normal leading-normal" placeholder="neue-email@beispiel.de" type="email"/>
                    </div>
                </label>
            </div>
            <div class="flex flex-col gap-2">
                <label class="flex flex-col min-w-40 flex-1">
                    <p class="text-slate-100 text-base font-medium leading-normal pb-2">E-Mail-Adresse bestätigen</p>
                    <div class="relative">
                        <input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-primary/20 bg-primary/5 h-14 placeholder:text-primary/40 p-[15px] text-base font-normal leading-normal" placeholder="neue-email@beispiel.de" type="email"/>
                    </div>
                </label>
            </div>
            <!-- Info Message -->
            <div class="flex gap-3 px-1 py-2">
                <span class="material-symbols-outlined text-primary shrink-0">info</span>
                <p class="text-slate-400 text-sm leading-relaxed">
                    Wir senden Ihnen einen Bestätigungslink an Ihre neue E-Mail-Adresse. Bitte klicken Sie auf den Link, um die Änderung abzuschließen.
                </p>
            </div>
            <!-- Action Button -->
            <div class="pt-6 pb-10">
                <button class="w-full bg-primary hover:brightness-110 text-background-dark font-bold text-lg h-14 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/30 transition-all">
                    <span>Speichern &amp; Bestätigen</span>
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
                <button class="w-full mt-4 text-slate-400 font-medium text-base h-12 rounded-xl flex items-center justify-center hover:bg-primary/10 transition-all">
                    Abbrechen
                </button>
            </div>
        </div>
    </div>
    <!-- Decorative Background Element -->
    <div class="fixed -bottom-24 -right-24 w-64 h-64 bg-primary/10 blur-[100px] rounded-full pointer-events-none"></div>
    <div class="fixed -top-24 -left-24 w-64 h-64 bg-primary/5 blur-[100px] rounded-full pointer-events-none"></div>
</div>
</body></html>
