<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>User Login &amp; Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#13ec5b",
          "background-dark": "#1a1a1a",
          "surface-dark": "#2a2a2a",
        },
        fontFamily: {
          "display": ["Lexend", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
      },
    },
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden max-w-[480px] mx-auto">
<div class="flex items-center p-4 pb-2 justify-between">
<div class="flex size-12 shrink-0 items-center justify-center text-slate-100 cursor-pointer">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Welcome Back</h2>
</div>
<div class="flex px-4 py-3">
<div class="flex h-12 flex-1 items-center justify-center rounded-xl bg-surface-dark p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-background-dark has-[:checked]:text-white text-slate-400 text-sm font-medium leading-normal transition-all">
<span class="truncate">Login</span>
<input checked="" class="invisible w-0" name="auth_mode" type="radio" value="Login"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-background-dark has-[:checked]:text-white text-slate-400 text-sm font-medium leading-normal transition-all">
<span class="truncate">Sign Up</span>
<input class="invisible w-0" name="auth_mode" type="radio" value="Sign Up"/>
</label>
</div>
</div>
<div class="flex flex-col flex-1 px-4 py-4 gap-4">
<label class="flex flex-col flex-1 max-h-14">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-1 focus:ring-primary border-none bg-surface-dark h-14 placeholder:text-slate-500 p-4 text-base font-normal leading-normal transition-colors" placeholder="Username" value=""/>
</label>
<label class="flex flex-col flex-1 max-h-14">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-1 focus:ring-primary border-none bg-surface-dark h-14 placeholder:text-slate-500 p-4 text-base font-normal leading-normal transition-colors" placeholder="Email Address" type="email" value=""/>
</label>
<label class="flex flex-col flex-1 max-h-14">
<div class="flex w-full flex-1 items-stretch rounded-xl bg-surface-dark focus-within:ring-1 focus-within:ring-primary transition-colors">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border-none bg-transparent h-14 placeholder:text-slate-500 p-4 pr-2 text-base font-normal leading-normal" placeholder="Password" type="password" value=""/>
<div class="text-slate-500 flex items-center justify-center pr-4 cursor-pointer hover:text-slate-300 transition-colors">
<span class="material-symbols-outlined">visibility_off</span>
</div>
</div>
</label>
<div class="flex justify-end mt-[-8px]">
<a class="text-sm text-primary font-medium hover:underline" href="#">Forgot password?</a>
</div>
</div>
<div class="px-4 py-6 mt-auto flex flex-col gap-4">
<button class="w-full h-14 bg-primary text-black font-bold text-base rounded-xl flex items-center justify-center hover:bg-primary/90 transition-colors shadow-[0_0_15px_rgba(19,236,91,0.5)]">
      Continue
    </button>
<div class="flex items-center gap-4 my-2">
<div class="h-px bg-slate-800 flex-1"></div>
<span class="text-xs text-slate-400 font-medium uppercase tracking-wider">Or continue with</span>
<div class="h-px bg-slate-800 flex-1"></div>
</div>
<div class="flex gap-4">
<button class="flex-1 h-14 flex items-center justify-center gap-2 rounded-xl border border-slate-800 bg-surface-dark hover:bg-slate-800 transition-colors font-medium text-slate-300">
<span class="material-symbols-outlined text-xl">g_mobiledata</span>
        Google
      </button>
<button class="flex-1 h-14 flex items-center justify-center gap-2 rounded-xl border border-slate-800 bg-surface-dark hover:bg-slate-800 transition-colors font-medium text-slate-300">
<span class="material-symbols-outlined text-xl">ios</span>
        Apple
      </button>
</div>
</div>
</div>

</body></html>
