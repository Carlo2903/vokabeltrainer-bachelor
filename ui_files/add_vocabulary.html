<!DOCTYPE html>
<html class="dark" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Add New Vocabulary - VocabTrainer</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "primary-dark": "#0ea841",
                        "primary-light": "#8fffb3",
                        "background-dark": "#0a0c0a",
                        "surface-dark": "#1a1c1a",
                        "input-dark": "#252725",
                        "border-dark": "#333633",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-background-dark text-gray-100;
            }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="font-display selection:bg-primary selection:text-black min-h-screen flex justify-center">
<div class="w-full max-w-md bg-background-dark min-h-screen flex flex-col relative overflow-hidden">
    <div class="h-12 w-full flex justify-between items-center px-6 pt-2 select-none text-gray-400">
        <span class="text-sm font-semibold">9:41</span>
        <div class="flex gap-1.5 items-center">
            <span class="material-icons-round text-sm">signal_cellular_alt</span>
            <span class="material-icons-round text-sm">wifi</span>
            <span class="material-icons-round text-lg -rotate-90">battery_full</span>
        </div>
    </div>
    <header class="flex justify-between items-center px-4 py-3 sticky top-0 z-20 bg-background-dark/90 backdrop-blur-md border-b border-border-dark">
        <button class="text-primary hover:text-primary-light transition-colors px-2 py-1 text-base font-normal">
            Cancel
        </button>
        <h1 class="text-lg font-semibold tracking-tight text-white">Add Vocabulary</h1>
        <button class="text-primary hover:text-primary-light transition-colors px-2 py-1 text-base font-bold">
            Done
        </button>
    </header>
    <main class="flex-1 overflow-y-auto no-scrollbar pb-32 px-4 pt-6">
        <section class="bg-surface-dark rounded-xl p-1 mb-8 shadow-xl border border-border-dark">
            <div class="flex items-center justify-between relative">
                <button class="flex-1 py-4 px-4 flex flex-col items-center justify-center gap-1 rounded-lg hover:bg-input-dark transition-colors group">
                    <span aria-label="UK Flag" class="text-2xl mb-1" role="img">🇬🇧</span>
                    <span class="font-semibold text-xs uppercase tracking-widest text-gray-400 group-hover:text-primary">English</span>
                    <span class="material-icons-round text-xs text-gray-500">expand_more</span>
                </button>
                <div class="flex items-center justify-center w-10 h-10 rounded-full bg-primary text-black shadow-lg shadow-primary/20 z-10">
                    <span class="material-icons-round text-xl">swap_horiz</span>
                </div>
                <button class="flex-1 py-4 px-4 flex flex-col items-center justify-center gap-1 rounded-lg hover:bg-input-dark transition-colors group">
                    <span aria-label="German Flag" class="text-2xl mb-1" role="img">🇩🇪</span>
                    <span class="font-semibold text-xs uppercase tracking-widest text-gray-400 group-hover:text-primary">German</span>
                    <span class="material-icons-round text-xs text-gray-500">expand_more</span>
                </button>
            </div>
        </section>
        <form class="space-y-6">
            <div class="group">
                <div class="flex justify-between items-end mb-2 px-1">
                    <label class="text-xs uppercase tracking-widest font-bold text-primary" for="word">The Word</label>
                    <button class="text-[10px] uppercase font-bold text-gray-500 hover:text-primary flex items-center gap-1 transition-colors" type="button">
                        <span class="material-icons-round text-sm">auto_awesome</span> Smart Suggest
                    </button>
                </div>
                <div class="relative">
                    <input class="w-full bg-input-dark border border-border-dark rounded-xl py-5 px-5 text-2xl font-bold text-white placeholder-gray-600 focus:ring-1 focus:ring-primary focus:border-primary transition-all shadow-inner" id="word" placeholder="scrutinize" type="text" value="scrutinize"/>
                    <span class="absolute right-5 top-1/2 -translate-y-1/2 text-primary material-icons-round">check_circle</span>
                </div>
            </div>
            <div>
                <div class="flex justify-between items-end mb-2 px-1">
                    <label class="text-xs uppercase tracking-widest font-bold text-gray-400" for="definition">Definition / Context</label>
                </div>
                <textarea class="w-full bg-input-dark border border-border-dark rounded-xl py-4 px-5 text-base leading-relaxed text-gray-200 placeholder-gray-600 focus:ring-1 focus:ring-primary focus:border-primary transition-all shadow-inner resize-none" id="definition" placeholder="Describe the meaning..." rows="3">to examine very closely and profoundly</textarea>
                <div class="flex gap-2 mt-3 px-1 overflow-x-auto no-scrollbar">
                    <button class="flex items-center gap-2 bg-surface-dark hover:bg-input-dark border border-border-dark rounded-full px-4 py-2 text-xs font-semibold text-gray-300 transition-colors whitespace-nowrap" type="button">
                        <span class="material-icons-round text-sm text-primary">image</span> Add Visual
                    </button>
                    <button class="flex items-center gap-2 bg-surface-dark hover:bg-input-dark border border-border-dark rounded-full px-4 py-2 text-xs font-semibold text-gray-300 transition-colors whitespace-nowrap" type="button">
                        <span class="material-icons-round text-sm text-primary">mic</span> Pronunciation
                    </button>
                    <button class="flex items-center gap-2 bg-surface-dark hover:bg-input-dark border border-border-dark rounded-full px-4 py-2 text-xs font-semibold text-gray-300 transition-colors whitespace-nowrap" type="button">
                        <span class="material-icons-round text-sm text-primary">tag</span> Tags
                    </button>
                </div>
            </div>
            <div>
                <div class="flex justify-between items-end mb-2 px-1">
                    <label class="text-xs uppercase tracking-widest font-bold text-gray-400" for="translation">Translation</label>
                    <button class="text-[10px] uppercase font-bold text-primary hover:underline flex items-center gap-1" type="button">
                        <span class="material-icons-round text-xs">translate</span> Auto-fill
                    </button>
                </div>
                <div class="relative">
                    <input class="w-full bg-input-dark border border-border-dark rounded-xl py-5 px-5 text-lg font-medium text-white placeholder-gray-600 focus:ring-1 focus:ring-primary focus:border-primary transition-all shadow-inner" id="translation" placeholder="Enter translation..." type="text" value="Gründlich prüfen"/>
                </div>
            </div>
            <div class="pt-2">
                <button class="w-full flex items-center justify-between bg-surface-dark p-4 rounded-xl border border-border-dark group active:scale-[0.98] transition-all" type="button">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-lg bg-border-dark flex items-center justify-center text-primary border border-white/5">
                            <span class="material-icons-round">folder</span>
                        </div>
                        <div class="text-left">
                            <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Target Deck</p>
                            <p class="text-sm font-semibold text-white group-hover:text-primary transition-colors">Business English</p>
                        </div>
                    </div>
                    <span class="material-icons-round text-gray-600">chevron_right</span>
                </button>
            </div>
        </form>
    </main>
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-md px-6 z-30 pointer-events-none">
        <button class="w-full bg-primary hover:bg-primary-light text-black font-extrabold text-base uppercase tracking-widest py-5 rounded-2xl shadow-[0_10px_30px_rgba(19,236,91,0.3)] active:scale-[0.97] transition-all flex items-center justify-center gap-2 pointer-events-auto border-t border-white/20">
            <span class="material-icons-round">save</span>
            Save Vocabulary
        </button>
    </div>
    <div class="absolute top-[-5%] right-[-10%] w-72 h-72 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[15%] left-[-15%] w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
</div>

</body></html>
