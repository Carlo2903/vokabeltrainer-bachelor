<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-dark": "#0a0a0a",
                        "surface-dark": "#161616",
                        "error": "#ff4d4d",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #0a0a0a;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #13ec5b20;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background-dark text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col pb-10">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between border-b border-primary/10">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-100">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Einstellungen</h1>
</div>
</header>
<main class="flex-1 overflow-y-auto px-4 py-6 space-y-8">
<!-- Sektion Konto -->
<section>
<h2 class="text-primary text-xs font-bold uppercase tracking-[0.15em] px-2 mb-3">Konto</h2>
<div class="bg-surface-dark rounded-xl overflow-hidden divide-y divide-primary/5 border border-primary/5">
<div class="flex items-center gap-4 p-4 hover:bg-primary/5 cursor-pointer transition-colors">
<div class="flex items-center justify-center rounded-lg bg-primary/10 text-primary p-2">
<span class="material-symbols-outlined">mail</span>
</div>
<div class="flex-1">
<p class="font-medium text-sm">E-Mail-Adresse</p>
<p class="text-[10px] text-slate-400">max.mustermann@web.de</p>
</div>
<span class="material-symbols-outlined text-slate-600 text-sm">chevron_right</span>
</div>
<div class="flex items-center gap-4 p-4 hover:bg-primary/5 cursor-pointer transition-colors">
<div class="flex items-center justify-center rounded-lg bg-primary/10 text-primary p-2">
<span class="material-symbols-outlined">lock</span>
</div>
<p class="flex-1 font-medium text-sm">Passwort ändern</p>
<span class="material-symbols-outlined text-slate-600 text-sm">chevron_right</span>
</div>
</div>
</section>
<!-- Sektion Lernen -->
<section>
<h2 class="text-primary text-xs font-bold uppercase tracking-[0.15em] px-2 mb-3">Lernen</h2>
<div class="bg-surface-dark rounded-xl overflow-hidden divide-y divide-primary/5 border border-primary/5">
<div class="flex items-center gap-4 p-4 hover:bg-primary/5 cursor-pointer transition-colors">
<div class="flex items-center justify-center rounded-lg bg-primary/10 text-primary p-2">
<span class="material-symbols-outlined">track_changes</span>
</div>
<div class="flex-1">
<p class="font-medium text-sm">Tägliches Ziel</p>
<p class="text-[10px] text-slate-400">20 Vokabeln / Tag</p>
</div>
<span class="material-symbols-outlined text-slate-600 text-sm">chevron_right</span>
</div>
<div class="flex items-center gap-4 p-4">
<div class="flex items-center justify-center rounded-lg bg-primary/10 text-primary p-2">
<span class="material-symbols-outlined">notifications_active</span>
</div>
<p class="flex-1 font-medium text-sm">Erinnerungen</p>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-slate-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
</div>
</div>
</div>
</section>
<!-- Sektion Support -->
<section>
<h2 class="text-primary text-xs font-bold uppercase tracking-[0.15em] px-2 mb-3">Support</h2>
<div class="bg-surface-dark rounded-xl overflow-hidden divide-y divide-primary/5 border border-primary/5">
<div class="flex items-center gap-4 p-4 hover:bg-primary/5 cursor-pointer transition-colors">
<div class="flex items-center justify-center rounded-lg bg-primary/10 text-primary p-2">
<span class="material-symbols-outlined">info</span>
</div>
<p class="flex-1 font-medium text-sm">Über uns</p>
<span class="material-symbols-outlined text-slate-600 text-sm">chevron_right</span>
</div>
</div>
</section>
<!-- Logout Button -->
<button class="w-full mt-8 py-4 px-6 rounded-xl bg-error/10 hover:bg-error/20 text-error font-bold flex items-center justify-center gap-2 transition-all border border-error/20">
<span class="material-symbols-outlined">logout</span>
                Abmelden
            </button>
<div class="text-center text-slate-600 text-[10px] pt-4 pb-8 font-medium">
                Vokabeltrainer App v2.4.1
            </div>
</main>
</div>
</body></html>
